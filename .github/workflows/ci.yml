name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run unit tests
      run: dotnet test tests/TaskManagementAPI.Tests.Unit --configuration Release --no-build --verbosity normal
    
    - name: Run integration tests
      run: dotnet test tests/TaskManagementAPI.Tests.Integration --configuration Release --no-build --verbosity normal
    
    - name: Collect coverage
      run: dotnet test /p:CollectCoverage=true /p:CoverageFormat=opencover /p:Exclude="[*Tests]*"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.opencover.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
